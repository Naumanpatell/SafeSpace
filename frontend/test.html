<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>SafeSpace Test Email App</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f3f3f3;
    margin: 0;
    padding: 40px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    margin-top: 0;
}

.field {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    font-size: 14px;
}

div[aria-label="Message body"] {
    border: 1px solid #ccc;
    min-height: 180px;
    padding: 10px;
    font-size: 14px;
    outline: none;
}

button[aria-label="Send"] {
    padding: 10px 18px;
    font-size: 14px;
    border: none;
    background-color: #0078d4;
    color: white;
    border-radius: 4px;
    cursor: pointer;
}

button[aria-label="Send"]:hover {
    background-color: #005a9e;
}
</style>
</head>

<body>

<div class="container">

<h2>SafeSpace Email Composer</h2>

<div class="field">
<input type="email" placeholder="To" aria-label="To">
</div>

<div class="field">
<input type="text" placeholder="Subject" aria-label="Subject">
</div>

<div class="field">
<div contenteditable="true" aria-label="Message body" placeholder="Write your email..."></div>
</div>

<div class="field">
<button type="button" id="splitButton-rjj__primaryActionButton" aria-label="Send" title="Send (Ctrl+Enter)">Send</button>
</div>

</div>

<script>
// -----------------------------
// SAFESPACE BANNER
// -----------------------------
function addRecordingBanner() {
    if (document.getElementById("safeSpaceBanner")) return;

    const banner = document.createElement("div");
    banner.id = "safeSpaceBanner";
    banner.innerText = "⚠️ SafeSpace: Your email is being checked";

    banner.style.position = "fixed";
    banner.style.top = "0";
    banner.style.left = "0";
    banner.style.width = "100%";
    banner.style.backgroundColor = "red";
    banner.style.color = "white";
    banner.style.fontSize = "12px";
    banner.style.fontWeight = "bold";
    banner.style.textAlign = "center";
    banner.style.padding = "4px";
    banner.style.zIndex = "9999";

    document.body.appendChild(banner);
    document.body.style.paddingTop = "22px";
}

// -----------------------------
// GET EMAIL CONTENT
// -----------------------------
function getEmailContent() {
    const subjectField = document.querySelector('input[aria-label="Subject"]');
    const bodyField = document.querySelector('div[aria-label="Message body"]');

    const subject = subjectField ? subjectField.value : "";
    const body = bodyField ? bodyField.innerText : "";

    const fullEmail = `Subject: ${subject}\n\n${body}`;

    console.log("SafeSpace captured email:");
    console.log(fullEmail);

    sendToBackend(fullEmail);
}

// -----------------------------
// SEND TO FASTAPI
// -----------------------------
function sendToBackend(emailText) {
    fetch("http://127.0.0.1:8000/check-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: emailText })
    })
    .then(res => res.json())
    .then(data => {
        console.log("Backend response:", data);
        if (data.offensive) {
            alert("SafeSpace Warning: Offensive language detected.");
        } else {
            alert("Email looks safe! (Simulation)");
        }
    })
    .catch(err => console.error("Backend error:", err));
}

// -----------------------------
// FIND SEND BUTTON & SETUP
// -----------------------------
function setupSendButton() {
    const sendButton = document.querySelector('button[aria-label="Send"]');

    if (sendButton) {
        alert("send button detected")
        // Highlight button like extension
        sendButton.style.setProperty("background-color", "yellow", "important");
        sendButton.style.setProperty("color", "black", "important");
        sendButton.style.setProperty("border", "2px solid orange", "important");

        sendButton.addEventListener("click", function () {
            console.log("send button clicked!")
            getEmailContent();
        });

        console.log("SafeSpace: Send button ready");
    } else {
        setTimeout(setupSendButton, 500);
    }
}

// -----------------------------
// START SIMULATION
// -----------------------------
addRecordingBanner();
setupSendButton();
</script>

</body>
</html>
